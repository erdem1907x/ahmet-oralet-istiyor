let W, H;
function resize() {
    const ratio = 9/16;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w/h > ratio) w = h * ratio;
    else             h = w / ratio;
    W = canvas.width  = Math.floor(w);
    H = canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', resize);

let ac = null;
function getAC() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    return ac;
}
function beep(freq, dur, vol) {
    try {
        const a = getAC();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(vol||0.2, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
        o.start(); o.stop(a.currentTime+dur);
    } catch(e){}
}
function eatSound(pts) {
    const f={90:750,80:620,70:500,60:400,50:320};
    beep(f[pts]||440, 0.2, 0.2);
}
function oraletSound() {
    // Özel sevinç melodisi — 3 nota üst üste
    beep(660, 0.15, 0.25);
    setTimeout(()=>beep(880, 0.15, 0.25), 130);
    setTimeout(()=>beep(1100,0.25, 0.28), 260);
}
function missSound()     { beep(120, 0.3, 0.15); }
function gameOverSound() { beep(200,0.2,0.15); setTimeout(()=>beep(130,0.4,0.15),220); }

const ITEMS = [
    {emoji:'🧃', pts:100, col:'#f39c12', isOralet:true},
    {emoji:'☕',  pts:90,  col:'#6f4e37'},
    {emoji:'🍓', pts:80,  col:'#e74c3c'},
    {emoji:'🍌', pts:70,  col:'#f1c40f'},
    {emoji:'🍫', pts:60,  col:'#7b4f2e'},
    {emoji:'🍬', pts:50,  col:'#e91e93'},
];

// ── Oyun durumu ────────────────────────────────────
let gs = 'start'; // start | playing | over
let score, lives, spd, elapsed, lastSpawn, spawnMs;
let player, drops, sparks, popups, flashAlpha;
let raf, prev;

// Başlangıç butonu alanı (canvas koordinatları)
let playBtnRect = {x:0,y:0,w:0,h:0};

function initGame() {
    score=0; lives=5; spd=1; elapsed=0;
    lastSpawn=0; spawnMs=1400; flashAlpha=0;
    drops=[]; sparks=[]; popups=[];
    const pw = W*0.18;
    player = {
        x: W/2 - pw/2,
        y: H - pw*1.1 - H*0.02,
        w: pw,
        h: pw*1.1,
        left:false, right:false
    };
}

// ── Açılış ekranı çizimi ───────────────────────────
function drawStart() {
    // Arka plan
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#ff6b00');
    g.addColorStop(0.5,'#ffcc00');
    g.addColorStop(1,'#ff6b00');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // Ahmet (sol) + Oralet (sağ) yan yana
    const r   = W*0.17;
    const cy2 = H*0.26;
    const acx = W*0.28;  // Ahmet merkezi
    const ocx = W*0.72;  // Oralet merkezi

    // Ahmet yuvarlak
    if (ahmetImg.complete && ahmetImg.naturalWidth>0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(acx, cy2, r, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(ahmetImg, acx-r, cy2-r, r*2, r*2);
        ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(acx, cy2, r, 0, Math.PI*2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.stroke();

    // Oralet görsel (kare, yuvarlak köşeli)
    if (oraletImg.complete && oraletImg.naturalWidth>0) {
        const os = r*2;
        ctx.save();
        roundRect(ocx-r, cy2-r, os, os, r*0.25);
        ctx.clip();
        ctx.drawImage(oraletImg, ocx-r, cy2-r, os, os);
        ctx.restore();
    }
    ctx.save();
    roundRect(ocx-r, cy2-r, r*2, r*2, r*0.25);
    ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.stroke();
    ctx.restore();

    // Başlık
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`900 ${W*0.11}px Impact, Arial Black, Arial`;
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.4)';
    ctx.shadowBlur=8; ctx.shadowOffsetY=4;

    const lh = W*0.125;
    ctx.fillText('AHMET',     W/2, H*0.52);
    ctx.fillText('ORALET',    W/2, H*0.52+lh);
    ctx.fillText('İSTİYOR!',  W/2, H*0.52+lh*2);
    ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    // OYNA butonu
    const bw=W*0.55, bh=H*0.09;
    const bx=W/2-bw/2, by=H*0.84;
    playBtnRect = {x:bx, y:by, w:bw, h:bh};

    ctx.fillStyle='#27ae60';
    roundRect(bx, by, bw, bh, bh/2);
    ctx.fill();

    // Gölge
    ctx.fillStyle='rgba(0,0,0,0.25)';
    roundRect(bx+4, by+6, bw, bh, bh/2);
    ctx.fill();
    ctx.fillStyle='#27ae60';
    roundRect(bx, by, bw, bh, bh/2);
    ctx.fill();

    ctx.fillStyle='#fff';
    ctx.font=`bold ${W*0.075}px Impact, Arial Black, Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('▶  OYNA', W/2, by+bh/2);
}

// ── Game Over çizimi ───────────────────────────────
function drawGameOver() {
    // Yarı saydam arka plan
    ctx.fillStyle='rgba(5,5,20,0.9)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign='center'; ctx.textBaseline='middle';

    ctx.font=`900 ${W*0.15}px Impact, Arial`;
    ctx.fillStyle='#e74c3c';
    ctx.fillText('💀 BİTTİ!', W/2, H*0.3);

    ctx.font=`bold ${W*0.09}px Arial`;
    ctx.fillStyle='#ffd700';
    ctx.fillText('⭐ Skor: ' + score, W/2, H*0.45);

    const hi = parseInt(localStorage.getItem('ahmetHi')||'0');
    ctx.font=`${W*0.055}px Arial`;
    ctx.fillStyle='#aaa';
    ctx.fillText('🏆 En yüksek: ' + hi, W/2, H*0.54);

    // Tekrar Oyna butonu
    const bw=W*0.65, bh=H*0.09;
    const bx=W/2-bw/2, by=H*0.66;
    playBtnRect = {x:bx, y:by, w:bw, h:bh};

    ctx.fillStyle='#2980b9';
    roundRect(bx, by, bw, bh, bh/2);
    ctx.fill();

    ctx.fillStyle='#fff';
    ctx.font=`bold ${W*0.07}px Impact, Arial`;
    ctx.fillText('🔄  TEKRAR OYNA', W/2, by+bh/2);
}

// ── Oyun çizimi ────────────────────────────────────
function drawGame() {
    // Arka plan
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#08112b');
    bg.addColorStop(1,'#152349');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // Yıldızlar
    ctx.fillStyle='rgba(255,255,255,0.15)';
    for(let i=0;i<30;i++) {
        ctx.fillRect((i*137+7)%W, (i*83+13)%(H*0.82), 2, 2);
    }

    // Zemin
    ctx.fillStyle='#2d5016';
    ctx.fillRect(0, H-H*0.025, W, H*0.025);
    ctx.fillStyle='#3d6b20';
    ctx.fillRect(0, H-H*0.025, W, H*0.007);

    // İtemler
    const isz = W*0.115;
    ctx.font=`${isz}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(const d of drops) {
        if(d.isOralet && oraletImg.complete && oraletImg.naturalWidth>0) {
            ctx.drawImage(oraletImg, d.x, d.y, d.sz, d.sz);
        } else {
            ctx.fillText(d.emoji, d.x+d.sz/2, d.y+d.sz/2);
        }
    }

    // Karakter
    const pr = player.w/2;
    const pcx = player.x+player.w/2;
    const pcy = player.y+pr;

    if(ahmetImg.complete && ahmetImg.naturalWidth>0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(pcx, pcy, pr, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(ahmetImg, pcx-pr, pcy-pr, pr*2, pr*2);
        ctx.restore();
        ctx.beginPath();
        ctx.arc(pcx, pcy, pr, 0, Math.PI*2);
        ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
        // Basit gövde
        ctx.fillStyle='#ddd';
        ctx.fillRect(pcx-player.w*0.26, pcy+pr-3, player.w*0.52, player.h-pr);
    } else {
        ctx.fillStyle='#3498db';
        ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.font=`bold ${W*0.04}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('AHMET',pcx,pcy);
    }

    // Kıvılcımlar
    for(const s of sparks) {
        ctx.save(); ctx.globalAlpha=s.a;
        ctx.fillStyle=s.col;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // Skor popupları
    for(const p of popups) {
        ctx.save(); ctx.globalAlpha=p.a;
        ctx.font=`bold ${W*0.065}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.strokeStyle='#000'; ctx.lineWidth=4;
        ctx.strokeText(p.txt,p.x,p.y);
        ctx.fillStyle='#ffd700';
        ctx.fillText(p.txt,p.x,p.y);
        ctx.restore();
    }

    // Hasar flaşı
    if(flashAlpha>0) {
        ctx.save(); ctx.globalAlpha=flashAlpha;
        ctx.fillStyle='#e74c3c';
        ctx.fillRect(0,0,W,H);
        ctx.restore();
    }

    // HUD
    const hudH=H*0.08;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,hudH);

    ctx.fillStyle='#ffd700';
    ctx.font=`bold ${W*0.065}px Arial`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('⭐ '+score, W*0.03, hudH/2);

    ctx.font=`${W*0.056}px serif`;
    ctx.textAlign='right';
    let hearts='';
    for(let i=0;i<5;i++) hearts += i<lives ? '❤️' : '🖤';
    ctx.fillText(hearts, W-W*0.02, hudH/2);

    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font=`${W*0.03}px Arial`;
    ctx.textAlign='center';
    ctx.fillText('⚡ x'+spd.toFixed(1), W/2, hudH/2);

    // İpucu
    if(elapsed<3000) {
        ctx.save();
        ctx.globalAlpha=(3000-elapsed)/3000*0.7;
        ctx.fillStyle='#fff';
        ctx.font=`${W*0.036}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('◀ Sola    Sağa ▶', W/2, H-H*0.055);
        ctx.restore();
    }
}

// ── Yardımcı: yuvarlak köşeli dikdörtgen ──────────
function roundRect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

// ── Patlama efekti ─────────────────────────────────
function burst(x,y,col) {
    for(let i=0;i<12;i++) {
        const a=(i/12)*Math.PI*2;
        sparks.push({
            x,y,
            vx:Math.cos(a)*(3+Math.random()*3),
            vy:Math.sin(a)*(3+Math.random()*3)-2,
            a:1, col, r:W*0.013*(0.5+Math.random()*0.8)
        });
    }
}

// ── Game Over ──────────────────────────────────────
function endGame() {
    gs='over';
    gameOverSound();
    const hi=Math.max(score, parseInt(localStorage.getItem('ahmetHi')||'0'));
    localStorage.setItem('ahmetHi', hi);
}

// ── Ana döngü ──────────────────────────────────────
function loop(ts) {
    if(gs!=='playing') return;
    const dt=Math.min(ts-prev,50);
    prev=ts; elapsed+=dt;

    spd     = 1+Math.floor(elapsed/9000)*0.13;
    spawnMs = Math.max(500, 1400-Math.floor(elapsed/9000)*75);

    const mv=W*0.0085*spd*(dt/16);
    if(player.left)  player.x-=mv;
    if(player.right) player.x+=mv;
    player.x=Math.max(0, Math.min(W-player.w, player.x));

    if(ts-lastSpawn>spawnMs) {
        const d=ITEMS[Math.floor(Math.random()*ITEMS.length)];
        const sz=W*0.115;
        drops.push({x:Math.random()*(W-sz), y:-sz, sz, ...d});
        lastSpawn=ts;
    }

    const is=W*0.0065*spd*(dt/16);
    for(let i=drops.length-1;i>=0;i--) {
        const d=drops[i];
        d.y+=is;
        const hitX=d.x+d.sz>player.x && d.x<player.x+player.w;
        const hitY=d.y+d.sz*0.8>player.y && d.y<player.y+player.h*0.65;
        if(hitX&&hitY) {
            score+=d.pts;
            burst(d.x+d.sz/2, d.y+d.sz/2, d.col);
            popups.push({x:d.x+d.sz/2, y:d.y, txt:'+'+d.pts, a:1});
            if(d.isOralet) oraletSound(); else eatSound(d.pts);
            drops.splice(i,1);
        } else if(d.y>H) {
            lives--;
            flashAlpha=0.45;
            missSound();
            drops.splice(i,1);
            if(lives<=0) { endGame(); }
        }
    }

    for(let i=sparks.length-1;i>=0;i--) {
        const s=sparks[i];
        s.x+=s.vx; s.y+=s.vy; s.vy+=0.3; s.a-=0.055;
        if(s.a<=0) sparks.splice(i,1);
    }
    for(let i=popups.length-1;i>=0;i--) {
        popups[i].y-=1.8; popups[i].a-=0.022;
        if(popups[i].a<=0) popups.splice(i,1);
    }
    if(flashAlpha>0) flashAlpha-=0.03;

    if(gs==='playing') {
        drawGame();
        raf=requestAnimationFrame(loop);
    } else {
        drawGame();
        drawGameOver();
    }
}

// ── Render döngüsü (start/over ekranları) ─────────
function renderStatic() {
    if(gs==='start')   drawStart();
    if(gs==='over')    { drawGame(); drawGameOver(); }
    if(gs!=='playing') requestAnimationFrame(renderStatic);
}

// ── Tıklama / dokunma ──────────────────────────────
function handleTap(px, py) {
    if(gs==='start' || gs==='over') {
        const b=playBtnRect;
        if(px>=b.x && px<=b.x+b.w && py>=b.y && py<=b.y+b.h) {
            try { getAC(); } catch(e){}
            initGame();
            gs='playing';
            prev=performance.now();
            cancelAnimationFrame(raf);
            raf=requestAnimationFrame(loop);
        }
        return;
    }
    if(gs==='playing') {
        if(px < W/2) { player.left=true;  player.right=false; }
        else          { player.right=true; player.left=false;  }
    }
}

function handleRelease() {
    if(player) { player.left=false; player.right=false; }
}

// Mouse
canvas.addEventListener('click', e => {
    const r=canvas.getBoundingClientRect();
    handleTap(e.clientX-r.left, e.clientY-r.top);
});

canvas.addEventListener('mousedown', e => {
    const r=canvas.getBoundingClientRect();
    const x=e.clientX-r.left;
    if(gs==='playing') {
        if(x<W/2) { player.left=true; player.right=false; }
        else       { player.right=true; player.left=false; }
    }
});
canvas.addEventListener('mouseup', handleRelease);

// Touch
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const t=e.touches[0];
    handleTap(t.clientX-r.left, t.clientY-r.top);
},{passive:false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if(gs!=='playing') return;
    const r=canvas.getBoundingClientRect();
    const x=e.touches[0].clientX-r.left;
    if(x<W/2) { player.left=true; player.right=false; }
    else       { player.right=true; player.left=false; }
},{passive:false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    handleRelease();
},{passive:false});

// Klavye
document.addEventListener('keydown', e => {
    if(gs!=='playing') return;
    if(e.key==='ArrowLeft')  { player.left=true;  player.right=false; }
    if(e.key==='ArrowRight') { player.right=true; player.left=false;  }
});
document.addEventListener('keyup', e => {
    if(e.key==='ArrowLeft'||e.key==='ArrowRight') handleRelease();
});

// ── Başlat ─────────────────────────────────────────
renderStatic();
</script>
